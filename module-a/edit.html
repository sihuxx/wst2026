<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>편집 화면</title>
  <link rel="stylesheet" href="./style/style.css">
</head>

<body>
  <header>
    <div class="header-content">
      <a href="./index.html">
        <h3>PhotoBooth</h3>
      </a>
      <button class="language-btn">한/영 전환</button>
    </div>
  </header>

  <main class="edit-scene">
    <div class="inner-content">
      <canvas></canvas>
      <div class="shoot-grid p1">
        <div class="shoot"></div>
        <div class="shoot"></div>
        <div class="shoot"></div>
        <div class="shoot"></div>
      </div>
      <div class="filter-content p2"> 
        <button class="active" onclick="setFilter('none', this)">기본</button>
        <button onclick="setFilter('grayscale(100%)', this)">흑백</button>
      </div>
      <button class="next-btn" onclick="nextStep()" disabled>다음 ▶</button>
    </div>
  </main>

  <script src="./script/init.js"></script>
  <script src="./script/edit.js"></script>
</body>

</html>

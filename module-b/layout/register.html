<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - TicketBox</title>
  <link href="./bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- NAV : include nav.php -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">TicketBox</a>
      <div class="ms-auto d-flex gap-2">
        <a href="login.html" class="btn btn-outline-light btn-sm">로그인</a>
        <a href="register.html" class="btn btn-light btn-sm">회원가입</a>
      </div>
    </div>
  </nav>
  <!-- END NAV -->

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <h4 class="mb-4">회원가입</h4>
        <form>
          <div class="mb-3">
            <label class="form-label">이름</label>
            <input type="text" class="form-control" placeholder="이름">
          </div>
          <div class="mb-3">
            <label class="form-label">이메일</label>
            <input type="email" class="form-control" placeholder="이메일">
          </div>
          <div class="mb-3">
            <label class="form-label">비밀번호</label>
            <div class="input-group">
              <input type="password" class="form-control" id="password" placeholder="비밀번호 (4자 이상)">
              <button class="btn btn-outline-secondary" type="button" id="togglePassword">보기</button>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">전화번호</label>
            <input type="text" class="form-control" placeholder="전화번호 (숫자만)">
          </div>
          <button type="submit" class="btn btn-dark w-100">회원가입</button>
        </form>
        <p class="text-center mt-3 small">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
      </div>
    </div>
  </div>

  <script src="./bootstrap.bundle.min.js"></script>
  <script>
    // 비밀번호 표시/숨김 토글
    document.getElementById('togglePassword').addEventListener('click', function () {
      const pw = document.getElementById('password');
      const isPassword = pw.type === 'password';
      pw.type = isPassword ? 'text' : 'password';
      this.textContent = isPassword ? '숨기기' : '보기';
    });
  </script>
</body>
</html>

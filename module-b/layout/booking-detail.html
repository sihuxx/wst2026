  <style>
    .ticket {
      border: 2px dashed #adb5bd;
      border-radius: 12px;
      padding: 24px;
      background: #fff;
      position: relative;
    }
    .ticket::before {
      content: '';
      position: absolute;
      left: -14px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      background: #f8f9fa;
      border-radius: 50%;
      border: 2px dashed #adb5bd;
    }
    .ticket::after {
      content: '';
      position: absolute;
      right: -14px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      background: #f8f9fa;
      border-radius: 50%;
      border: 2px dashed #adb5bd;
    }
    .ticket-seat {
      font-size: 2rem;
      font-weight: bold;
    }
  </style>
</head>
